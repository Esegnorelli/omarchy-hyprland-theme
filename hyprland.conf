$activeBorderColor = rgb(33ccff)
$inactiveBorderColor = rgb(1a1b26)
$shadowColor = 0xbb0a0b10

general {
    col.active_border = $activeBorderColor rgb(00ff99) 45deg
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 4
    gaps_out = 8
}

group {
    col.border_active = $activeBorderColor rgb(00ff99) 45deg
    col.border_inactive = $inactiveBorderColor

    groupbar {
        font_size = 9
        col.active = 0xcc33ccff
        col.inactive = 0x661a1b26
        gradients = true
        blur = true
        rounding = 4
        text_color = 0xffc0d0e8
    }
}

decoration {
    rounding = 10
    rounding_power = 2.0
    active_opacity = 0.70
    inactive_opacity = 0.45
    fullscreen_opacity = 0.90
    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.3

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = $shadowColor
        color_inactive = 0x550a0b10
        offset = 0, 4
        scale = 1.0
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.2
        vibrancy_darkness = 0.1
        special = true
        popups = true
        popups_ignorealpha = 0.2
    }
}

animations {
    enabled = true

    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = easeInOut, 0.42, 0, 0.58, 1

    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    animation = windowsMove, 1, 4, smoothIn
    animation = fadeIn, 1, 4, smoothIn
    animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 5, smoothIn
    animation = fadeShadow, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = fadeLayers, 1, 4, smoothIn
    animation = border, 1, 10, easeInOut
    animation = borderangle, 1, 30, easeInOut, loop
    animation = workspaces, 1, 5, overshot, slidefade 20%
    animation = specialWorkspace, 1, 5, overshot, slidefade 20%
}

# Layer rules for blur on waybar and walker
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.3, match:namespace walker
layerrule = animation slide top, match:namespace walker

# Hyprland cursor theme
env = XCURSOR_THEME,hyprland_theme
env = HYPRCURSOR_THEME,hyprcursor_logo
